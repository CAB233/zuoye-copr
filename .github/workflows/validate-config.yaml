# Ref: https://github.com/scottames/copr/blob/main/.github/workflows/renovate-config-validator.yaml

name: Validate Config
on:
  pull_request:
    branches:
      - main
    paths:
      - .github/renovate.json
      - .github/renovate-bot.json
      - .github/workflows/run-renovate.yml
  push:
    branches:
      - main
    paths:
      - .github/renovate.json
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-config:
    name: Validate Renovate Config
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        config:
          - .github/renovate.json
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: suzuki-shunsuke/github-action-renovate-config-validator@ee9f69e1f683ed0d08225086482b34fc9abe9300 # v2.1.0
        with:
          config_file_path: ${{ matrix.config }}

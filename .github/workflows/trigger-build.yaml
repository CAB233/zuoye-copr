name: Trigger Build

on:
  push:
    branches:
      - main
    paths:
      - "copr/*/*.spec"
  workflow_dispatch:
    inputs:
      packages:
        description: "手动触发构建（例如：pkg1 pkg2）"
        required: false
        type: string

permissions:
  contents: read

jobs:
  metadata:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.packages.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Get changed spec files
        id: changed
        uses: step-security/changed-files@2e07db73e5ccdb319b9a6c7766bd46d39d304bad # v47.0.5
        with:
          since_last_remote_commit: true
          files: |
            copr/*/*.spec

      - name: Create package matrix
        id: packages
        shell: bash
        run: |
          set -euo pipefail
          
          if [ -n "${{ github.event.inputs.packages }}" ]; then
            inputs="${{ github.event.inputs.packages }}"
            echo "::notice::手动触发构建的包: ${{ github.event.inputs.packages }}"
          else
            inputs="${{ steps.changed.outputs.all_changed_files }}"
          fi
          
          include='[]'
          seen=''
          for i in $inputs; do
            if [ -z "$i" ]; then
              continue
            fi
            
            spec_file=''
            package_name=''
            if [[ "$i" =~ ^copr/[^/]+/[^/]+\.spec$ ]]; then
              spec_file="$i"
              
              if [ ! -f "$spec_file" ]; then
                echo "::notice::跳过已删除的包：$spec_file"
                continue
              fi
              
              package_name="$(awk '
                BEGIN { IGNORECASE = 1 }
                /^[[:space:]]*Name:[[:space:]]*/ {
                  print $2
                  exit
                }
              ' "$spec_file")"
              if [ -z "$package_name" ]; then
                echo "::warning::无法提取包名：$spec_file"
                continue
              fi
            elif [[ "$i" =~ ^[A-Za-z0-9_.+-]+$ ]]; then
              package_name="$i"
              spec_file="$(find copr -mindepth 2 -maxdepth 2 -type f -name '*.spec' -exec awk -v package="$package_name" '
                BEGIN { IGNORECASE = 1 }
                /^[[:space:]]*Name:[[:space:]]*/ && $2 == package {
                  print FILENAME
                  exit
                }
              ' {} + | head -n 1)"
              if [ -z "$spec_file" ]; then
                echo "::warning::找不到对应的包: $package_name"
                continue
              fi
            else
              echo "::warning::跳过无法识别的输入: $i"
              continue
            fi
            
            if printf '%s\n' "$seen" | grep -qxF "$package_name"; then
              continue
            fi
            seen="${seen}${package_name}"$'\n'
            
            include="$(jq -c \
              --arg spec "$spec_file" \
              --arg package "$package_name" \
              '. += [{"spec": $spec, "package": $package}]' \
              <<< "$include")"
          done
          
          echo "::group::COPR 重构列表"
          jq . <<< "$include"
          echo "::endgroup::"
          
          matrix="$(jq -cn --argjson include "$include" '{"include": $include}')"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  trigger-webhook:
    needs: metadata
    if: needs.metadata.outputs.matrix != '{"include":[]}'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.metadata.outputs.matrix) }}
    steps:
      - name: Trigger ${{ matrix.package }}
        run: |
          # URL 末尾自带斜杠
          # https://docs.pagure.org/copr.copr/user_documentation.html#webhooks
          echo "::notice title=触发构建::${{ matrix.package }}"
          curl -X POST "${{ secrets.COPR_WEBHOOK }}${{ matrix.package }}"
